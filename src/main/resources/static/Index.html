<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MAT Department - Course Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <style> body { font-family: 'Inter', system-ui, sans-serif; } </style>
</head>
<body class="bg-gray-50">
<div class="flex h-screen">
    <!-- Sidebar -->
    <div class="w-64 bg-indigo-700 text-white p-6">
        <h1 class="text-2xl font-bold mb-8 flex items-center gap-2">
            <i class="fas fa-university"></i> MAT Department
        </h1>
        <nav class="space-y-2">
            <a href="#" onclick="showSection('dashboard')" class="flex items-center gap-3 px-4 py-3 rounded-lg hover:bg-indigo-600">Dashboard</a>
            <a href="#" onclick="showSection('manage')" class="flex items-center gap-3 px-4 py-3 rounded-lg hover:bg-indigo-600">Manage Courses (CRUD)</a>
        </nav>
    </div>

    <!-- Main Content -->
    <div class="flex-1 overflow-auto">
        <div class="p-8">
            <!-- DASHBOARD -->
            <div id="dashboard" class="section">
                <h2 class="text-3xl font-bold mb-6">Mathematics Department Dashboard</h2>
                <div class="grid grid-cols-3 gap-6">
                    <div id="foundation-card" class="bg-white p-6 rounded-2xl shadow"></div>
                    <div id="undergrad-card" class="bg-white p-6 rounded-2xl shadow"></div>
                    <div id="honours-card" class="bg-white p-6 rounded-2xl shadow"></div>
                </div>
                <button onclick="loadAllCourses()" class="mt-8 px-6 py-3 bg-indigo-600 text-white rounded-xl hover:bg-indigo-700 flex items-center gap-2">
                    <i class="fas fa-sync"></i> Refresh Data
                </button>
            </div>

            <!-- MANAGE COURSES (CRUD) -->
            <div id="manage" class="section hidden">
                <h2 class="text-3xl font-bold mb-6">Manage Courses – Full CRUD</h2>
                <button onclick="showAddForm()" class="mb-6 px-6 py-3 bg-green-600 text-white rounded-xl hover:bg-green-700 flex items-center gap-2">
                    <i class="fas fa-plus"></i> Add New Course
                </button>

                <div class="bg-white rounded-2xl shadow overflow-hidden">
                    <table class="w-full">
                        <thead class="bg-gray-100">
                        <tr>
                            <th class="px-6 py-4 text-left">Code</th>
                            <th class="px-6 py-4 text-left">Name</th>
                            <th class="px-6 py-4 text-left">Level</th>
                            <th class="px-6 py-4 text-center">Actions</th>
                        </tr>
                        </thead>
                        <tbody id="course-table" class="divide-y"></tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>
</div>

<!-- Modal -->
<div id="modal" class="hidden fixed inset-0 bg-black/50 flex items-center justify-center z-50">
    <div class="bg-white rounded-3xl p-8 w-full max-w-md">
        <h3 id="modal-title" class="text-2xl font-semibold mb-6">Add Course</h3>
        <form id="course-form">
            <input type="hidden" id="edit-code">
            <div class="space-y-4">
                <div>
                    <label class="block text-sm font-medium mb-1">Course Code</label>
                    <input id="form-code" type="text" class="w-full border rounded-xl px-4 py-3" required>
                </div>
                <div>
                    <label class="block text-sm font-medium mb-1">Course Name</label>
                    <input id="form-name" type="text" class="w-full border rounded-xl px-4 py-3" required>
                </div>
                <div>
                    <label class="block text-sm font-medium mb-1">Level</label>
                    <select id="form-level" class="w-full border rounded-xl px-4 py-3">
                        <option value="Foundation">Foundation</option>
                        <option value="Undergraduate">Undergraduate</option>
                        <option value="Honours">Honours</option>
                    </select>
                </div>
            </div>
            <div class="flex gap-3 mt-8">
                <button type="button" onclick="hideModal()" class="flex-1 py-3 border rounded-2xl">Cancel</button>
                <button type="submit" class="flex-1 py-3 bg-indigo-600 text-white rounded-2xl">Save</button>
            </div>
        </form>
    </div>
</div>

<script>
    const API = '/api/courses';
    let currentCourses = [];

    async function apiCall(url, method, body = null) {
        try {
            const options = {
                method: method,
                headers: { 'Content-Type': 'application/json' }
            };
            if (body) options.body = JSON.stringify(body);

            const res = await fetch(url, options);
            if (!res.ok) {
                const text = await res.text();
                throw new Error(`HTTP ${res.status}: ${text || res.statusText}`);
            }
            return res.headers.get('content-type')?.includes('application/json') ? await res.json() : await res.text();
        } catch (err) {
            console.error(err);
            alert("❌ ERROR: " + err.message + "\n\nCheck browser console (F12) for details.");
            throw err;
        }
    }

    async function loadAllCourses() {
        try {
            const data = await apiCall(API, 'GET');
            currentCourses = data;
            renderDashboard();
            renderTable();
            console.log("✅ Courses loaded successfully");
        } catch (e) {}
    }

    function renderDashboard() {
        const f = currentCourses.filter(c => c.level === 'Foundation').length;
        const u = currentCourses.filter(c => c.level === 'Undergraduate').length;
        const h = currentCourses.filter(c => c.level === 'Honours').length;

        document.getElementById('foundation-card').innerHTML = `<div class="text-center"><div class="text-5xl font-bold text-indigo-600">${f}</div><div class="text-gray-500">Foundation Courses</div></div>`;
        document.getElementById('undergrad-card').innerHTML = `<div class="text-center"><div class="text-5xl font-bold text-indigo-600">${u}</div><div class="text-gray-500">Undergraduate Courses</div></div>`;
        document.getElementById('honours-card').innerHTML = `<div class="text-center"><div class="text-5xl font-bold text-indigo-600">${h}</div><div class="text-gray-500">Honours Courses</div></div>`;
    }

    function renderTable() {
        const tbody = document.getElementById('course-table');
        tbody.innerHTML = currentCourses.map(c => `
            <tr class="hover:bg-gray-50">
                <td class="px-6 py-4 font-mono">${c.code}</td>
                <td class="px-6 py-4">${c.name}</td>
                <td class="px-6 py-4">
                    <span class="px-3 py-1 rounded-full text-xs font-medium ${c.level==='Honours'?'bg-purple-100 text-purple-700':c.level==='Undergraduate'?'bg-blue-100 text-blue-700':'bg-emerald-100 text-emerald-700'}">
                        ${c.level}
                    </span>
                </td>
                <td class="px-6 py-4 text-center space-x-4">
                    <button onclick="editCourse('${c.code}')" class="text-blue-600 hover:text-blue-700"><i class="fas fa-edit"></i></button>
                    <button onclick="deleteCourse('${c.code}')" class="text-red-600 hover:text-red-700"><i class="fas fa-trash"></i></button>
                </td>
            </tr>
        `).join('');
    }

    function showAddForm() {
        document.getElementById('modal-title').innerHTML = '➕ Add New Course';
        document.getElementById('edit-code').value = '';
        document.getElementById('form-code').value = '';
        document.getElementById('form-name').value = '';
        document.getElementById('form-level').value = 'Foundation';
        document.getElementById('modal').classList.remove('hidden');
    }

    async function editCourse(code) {
        const course = currentCourses.find(c => c.code === code);
        if (!course) return;
        document.getElementById('modal-title').innerHTML = '✏️ Edit Course';
        document.getElementById('edit-code').value = course.code;
        document.getElementById('form-code').value = course.code;
        document.getElementById('form-name').value = course.name;
        document.getElementById('form-level').value = course.level;
        document.getElementById('modal').classList.remove('hidden');
    }

    function hideModal() {
        document.getElementById('modal').classList.add('hidden');
    }

    async function deleteCourse(code) {
        if (!confirm(`Delete course ${code}?`)) return;
        try {
            await apiCall(`${API}/${code}`, 'DELETE');
            alert("✅ Course deleted successfully!");
            loadAllCourses();
        } catch (e) {}
    }

    document.getElementById('course-form').addEventListener('submit', async e => {
        e.preventDefault();
        const code = document.getElementById('form-code').value.trim();
        const name = document.getElementById('form-name').value.trim();
        const level = document.getElementById('form-level').value;
        const editCode = document.getElementById('edit-code').value;

        if (!code || !name) {
            alert("❌ Code and Name are required!");
            return;
        }

        const body = { code, name, level };

        try {
            if (editCode) {
                // UPDATE
                await apiCall(`${API}/${editCode}`, 'PUT', body);
                alert("✅ Course updated successfully!");
            } else {
                // CREATE
                await apiCall(API, 'POST', body);
                alert("✅ New course added successfully!");
            }
            hideModal();
            loadAllCourses();
        } catch (e) {}
    });

    // Load everything when page opens
    window.onload = () => {
        loadAllCourses();
    };

    function showSection(section) {
        document.querySelectorAll('.section').forEach(s => s.classList.add('hidden'));
        document.getElementById(section).classList.remove('hidden');
    }
</script>
</body>
</html>
